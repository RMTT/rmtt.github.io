language: go

go:
  - "1.15"  

# Specify which branches to build using a safelist
branches:
  only:
    - sources 

install:
    - uname -a
    - wget https://github.com/gohugoio/hugo/releases/download/v0.74.3/hugo_0.76.5_Linux-64bit.deb
    - sudo dpkg -i hugo*.deb

script:
  - hugo -e production

deploy:
  provider: pages 
  skip_cleanup: true 
  local_dir: public 
  target_branch: master
  token: $GITHUB_TOKEN 
  keep_history: true 
  on:
    branch: sources 
